<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- ╔═══════════════════════════════════════════════════════╗
       ║  CUSTOMIZE: Change title and brand name below        ║
       ╚═══════════════════════════════════════════════════════╝ -->
  <title>Your App</title>
  <style>
    /* ── CUSTOMIZATION TOKENS ──
       Change these values to match your brand: */
    :root {
      --brand-name-size: 17px;
      --glass-border: rgba(255,255,255,0.22);
      --glass-bg: rgba(8,18,38,0.32);
      --text: rgba(240,248,255,0.96);
      --text-soft: rgba(200,220,248,0.68);
      --text-muted: rgba(170,194,228,0.44);
      --ok: #4de2a7;
      --warn: #ffd77a;
      --danger: #ff6a75;
      /* Sphere accent — used for background gradient tints */
      --sphere-tint-1: rgba(60,110,220,0.18);
      --sphere-tint-2: rgba(30,65,160,0.14);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(ellipse 120% 90% at 75% 6%, var(--sphere-tint-1), transparent 55%),
        radial-gradient(ellipse 90% 80% at 22% 96%, var(--sphere-tint-2), transparent 55%),
        linear-gradient(168deg, #04060c, #060910 48%, #03050a);
      color: var(--text);
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Fullscreen canvas for 3D sphere ── */
    #sphereCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      z-index: 0;
    }

    /* ── Overlay layout ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      padding: max(20px, env(safe-area-inset-top)) 20px max(22px, env(safe-area-inset-bottom));
    }

    /* ── Brand header ── */
    .brand {
      text-align: center;
      padding-top: clamp(20px, 5vh, 52px);
      pointer-events: auto;
    }
    .brand h1 {
      font-size: clamp(30px, 5vw, 46px);
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1;
      color: rgba(236,246,255,0.97);
      text-shadow: 0 8px 32px rgba(80,145,255,0.28);
    }
    .brand p {
      margin-top: 7px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Center hint (over the sphere) ── */
    .sphere-hint {
      position: fixed;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      z-index: 2;
      pointer-events: none;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      transition: opacity 0.6s;
    }

    /* ── Bottom card ── */
    .card {
      width: min(420px, 100%);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 20px 18px 16px;
      background:
        linear-gradient(148deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05) 44%, rgba(255,255,255,0.02)),
        var(--glass-bg);
      box-shadow:
        0 24px 56px rgba(0,4,18,0.52),
        inset 0 1px 0 rgba(255,255,255,0.36),
        inset 0 -1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      pointer-events: auto;
      position: relative;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      pointer-events: none;
      background: linear-gradient(132deg, rgba(255,255,255,0.24), transparent 38%, rgba(255,255,255,0.08) 72%, transparent);
      mix-blend-mode: screen;
      opacity: 0.6;
    }

    /* ── Status pills ── */
    .pills {
      display: flex;
      gap: 7px;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .pill {
      border-radius: 999px;
      font-size: 11px;
      padding: 5px 10px;
      line-height: 1;
      letter-spacing: 0.02em;
      border: 1px solid rgba(255,255,255,0.2);
      background: linear-gradient(140deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04)), var(--glass-bg);
      color: rgba(210,230,255,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .pill[data-s="on"]  { border-color: rgba(77,226,167,0.5);  color: rgba(170,255,220,0.96); }
    .pill[data-s="off"] { border-color: rgba(255,106,117,0.45); color: rgba(255,190,195,0.94); }

    /* ── Liquid glass buttons ── */
    .gl {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      font-size: 14px;
      font-weight: 560;
      letter-spacing: 0.01em;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      background:
        linear-gradient(136deg, rgba(255,255,255,0.2), rgba(255,255,255,0.06) 48%, rgba(255,255,255,0.01)),
        var(--glass-bg);
      box-shadow:
        0 10px 24px rgba(0,6,18,0.4),
        inset 0 1px 0 rgba(255,255,255,0.48),
        inset 0 -1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(20px) saturate(170%);
      -webkit-backdrop-filter: blur(20px) saturate(170%);
      position: relative;
      overflow: hidden;
      isolation: isolate;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .gl::before {
      content: "";
      position: absolute;
      inset: -60% -40%;
      background: linear-gradient(115deg, transparent 22%, rgba(255,255,255,0.38) 48%, transparent 74%);
      transform: translate3d(-42%, -4%, 0) rotate(16deg);
      opacity: 0.45;
      transition: transform 0.7s cubic-bezier(0.2, 0.6, 0.1, 1), opacity 0.3s;
      pointer-events: none;
    }
    .gl::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        radial-gradient(100% 70% at 10% 0%, rgba(255,255,255,0.28), transparent 52%),
        radial-gradient(80% 65% at 95% 110%, rgba(80,160,255,0.2), transparent 55%);
      opacity: 0.5;
      mix-blend-mode: screen;
      animation: drift 6s ease-in-out infinite alternate;
    }
    .gl:hover, .gl:focus-visible {
      transform: translateY(-1.5px);
      border-color: rgba(255,255,255,0.38);
      box-shadow: 0 14px 30px rgba(0,8,22,0.48), inset 0 1px 0 rgba(255,255,255,0.62), inset 0 -1px 0 rgba(255,255,255,0.16);
      outline: none;
    }
    .gl:hover::before { transform: translate3d(34%, -2%, 0) rotate(16deg); opacity: 0.65; }
    .gl:active { transform: translateY(0); transition-duration: 0.06s; }
    .gl svg { width: 18px; height: 18px; flex-shrink: 0; position: relative; z-index: 1; }
    .gl span { position: relative; z-index: 1; }
    .gl + .gl { margin-top: 10px; }

    /* Telegram-tinted button */
    .gl--tg {
      background: linear-gradient(130deg, rgba(100,180,255,0.2), rgba(60,120,255,0.06) 50%, transparent), var(--glass-bg);
    }
    /* Primary action button */
    .gl--primary {
      background: linear-gradient(135deg, rgba(255,255,255,0.24), rgba(255,255,255,0.06) 52%, transparent), var(--glass-bg);
      font-weight: 600;
    }
    /* Disabled button */
    .gl--disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── Separator ── */
    .sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px 0;
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .sep::before, .sep::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    /* ── Status / version ── */
    .msg {
      min-height: 18px;
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: var(--text-soft);
    }
    .ver {
      margin-top: 6px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: rgba(180,205,235,0.4);
    }

    @keyframes drift {
      0%   { transform: translate3d(-3%, 0, 0) scale(1.01); }
      100% { transform: translate3d(3%, -1%, 0) scale(1.04); }
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .overlay { padding-left: 14px; padding-right: 14px; }
      .card { border-radius: 20px; padding: 16px 14px 12px; }
      .gl { min-height: 48px; border-radius: 14px; font-size: 13px; }
      .brand h1 { font-size: clamp(26px, 8.5vw, 36px); }
    }
    @media (max-height: 680px) {
      .brand { padding-top: clamp(10px, 2vh, 20px); }
      .brand p { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .gl, .gl::before, .gl::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

  <!-- 3D Sphere Canvas -->
  <canvas id="sphereCanvas"></canvas>

  <!-- Hint over sphere -->
  <div class="sphere-hint" id="hint">Tap the sphere to interact</div>

  <!-- Overlay UI -->
  <div class="overlay">

    <!-- ╔═══════════════════════════════════════════════════════╗
         ║  CUSTOMIZE: Brand name and tagline                   ║
         ╚═══════════════════════════════════════════════════════╝ -->
    <div class="brand">
      <h1>Your App</h1>
      <p>Tagline goes here</p>
    </div>

    <div style="display:flex;justify-content:center">
      <div class="card">

        <!-- Status pills — shows system health -->
        <div class="pills">
          <span class="pill" data-s="on">System: online</span>
          <span class="pill">4 agents</span>
        </div>

        <!-- ╔═══════════════════════════════════════════════════════╗
             ║  CUSTOMIZE: Auth buttons — replace hrefs & handlers  ║
             ╚═══════════════════════════════════════════════════════╝ -->

        <!-- Google OAuth button -->
        <a href="#" class="gl" id="googleBtn" onclick="alert('Wire up your Google OAuth here'); return false;">
          <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09a6.94 6.94 0 0 1 0-4.17V7.07H2.18A11.96 11.96 0 0 0 0 12c0 1.94.46 3.77 1.28 5.4l3.56-2.77.01-.54z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          <span>Continue with Google</span>
        </a>

        <!-- Telegram button -->
        <a href="#" class="gl gl--tg" id="telegramBtn" onclick="alert('Wire up your Telegram auth here'); return false;">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.28-.02-.12.03-2.02 1.28-5.69 3.77-.54.37-1.03.55-1.47.54-.48-.01-1.41-.27-2.1-.5-.85-.28-1.52-.42-1.46-.89.03-.25.38-.5 1.04-.76 4.07-1.77 6.79-2.94 8.14-3.51 3.88-1.62 4.69-1.9 5.21-1.91.12 0 .37.03.54.17.14.12.18.28.2.47-.01.06.01.24 0 .38z"/></svg>
          <span>Continue with Telegram</span>
        </a>

        <div class="sep">or</div>

        <!-- Primary CTA button -->
        <button class="gl gl--primary" id="signInBtn" onclick="alert('Wire up your sign-in logic here')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16.5" r="1.5"/></svg>
          <span>Sign In</span>
        </button>

        <div class="msg" id="msg"></div>

        <!-- ╔═══════════════════════════════════════════════════════╗
             ║  CUSTOMIZE: Version number                           ║
             ╚═══════════════════════════════════════════════════════╝ -->
        <div class="ver">v1.0.0</div>
      </div>
    </div>
  </div>

  <!-- Sphere engine (no dependencies, pure Canvas 2D) -->
  <script src="sphere.js"></script>

  <script>
  (function() {
    'use strict';

    // Sphere tap → visual ripple
    var canvas = document.getElementById('sphereCanvas');
    if (canvas) {
      canvas.addEventListener('pointerdown', function() {
        if (window.kimiko && window.kimiko.spawnTapRipple) {
          window.kimiko.spawnTapRipple();
        }
      }, { passive: true });
    }

    // ╔═══════════════════════════════════════════════════════╗
    // ║  CUSTOMIZE: Sphere color                             ║
    // ║  Call after sphere.js loads to set inner sphere color ║
    // ╚═══════════════════════════════════════════════════════╝

      if (window.kimiko && window.kimiko.setInnerColor) {
        // Example: warm orange inner sphere
        // window.kimiko.setInnerColor({ r: 255, g: 160, b: 60 });

        // Example: green inner sphere
        // window.kimiko.setInnerColor({ r: 60, g: 220, b: 140 });

        // Example: purple inner sphere
        // window.kimiko.setInnerColor({ r: 140, g: 80, b: 255 });

        // Default: cool white-blue (no call needed)
      }
    }, 100);

    // ╔═══════════════════════════════════════════════════════╗

    // setInterval(function() {

    //     window.kimiko._micLevel = Math.random() * 0.3;

    //   }

  })();
  </script>

</body>
</html>
