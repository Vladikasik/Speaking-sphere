<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#04060c">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- ╔═══════════════════════════════════════════════════════╗
       ║  CUSTOMIZE: Change title and brand name below        ║
       ╚═══════════════════════════════════════════════════════╝ -->
  <title>Neron</title>
  <style>
    /* ── CUSTOMIZATION TOKENS ──
       Change these values to match your brand: */
    :root {
      --brand-name-size: 17px;
      --glass-border: rgba(255,255,255,0.22);
      --glass-bg: rgba(8,18,38,0.32);
      --text: rgba(240,248,255,0.96);
      --text-soft: rgba(200,220,248,0.68);
      --text-muted: rgba(170,194,228,0.44);
      --ok: #4de2a7;
      --warn: #ffd77a;
      --danger: #ff6a75;
      /* Sphere accent — used for background gradient tints */
      --sphere-tint-1: rgba(60,110,220,0.18);
      --sphere-tint-2: rgba(30,65,160,0.14);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(ellipse 120% 90% at 75% 6%, var(--sphere-tint-1), transparent 55%),
        radial-gradient(ellipse 90% 80% at 22% 96%, var(--sphere-tint-2), transparent 55%),
        linear-gradient(168deg, #04060c, #060910 48%, #03050a);
      color: var(--text);
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Fullscreen canvas for 3D sphere ── */
    #sphereCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      z-index: 0;
    }

    /* ── Overlay layout ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      padding: max(20px, env(safe-area-inset-top)) 20px max(22px, env(safe-area-inset-bottom));
    }

    /* ── Brand header ── */
    .brand {
      text-align: center;
      padding-top: clamp(20px, 5vh, 52px);
      pointer-events: auto;
    }
    .brand h1 {
      font-size: clamp(30px, 5vw, 46px);
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1;
      color: rgba(236,246,255,0.97);
      text-shadow: 0 8px 32px rgba(80,145,255,0.28);
    }
    .brand p {
      margin-top: 7px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Center hint (over the sphere) ── */
    .sphere-hint {
      position: fixed;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      z-index: 2;
      pointer-events: none;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      transition: opacity 0.6s;
    }

    /* ── Bottom card ── */
    .card {
      width: min(420px, 100%);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 20px 18px 16px;
      background:
        linear-gradient(148deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05) 44%, rgba(255,255,255,0.02)),
        var(--glass-bg);
      box-shadow:
        0 24px 56px rgba(0,4,18,0.52),
        inset 0 1px 0 rgba(255,255,255,0.36),
        inset 0 -1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      pointer-events: auto;
      position: relative;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      pointer-events: none;
      background: linear-gradient(132deg, rgba(255,255,255,0.24), transparent 38%, rgba(255,255,255,0.08) 72%, transparent);
      mix-blend-mode: screen;
      opacity: 0.6;
    }

    /* ── Status pills ── */
    .pills {
      display: flex;
      gap: 7px;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .pill {
      border-radius: 999px;
      font-size: 11px;
      padding: 5px 10px;
      line-height: 1;
      letter-spacing: 0.02em;
      border: 1px solid rgba(255,255,255,0.2);
      background: linear-gradient(140deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04)), var(--glass-bg);
      color: rgba(210,230,255,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .pill[data-s="on"]  { border-color: rgba(77,226,167,0.5);  color: rgba(170,255,220,0.96); }
    .pill[data-s="off"] { border-color: rgba(255,106,117,0.45); color: rgba(255,190,195,0.94); }

    /* ── Liquid glass buttons ── */
    .gl {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      font-size: 14px;
      font-weight: 560;
      letter-spacing: 0.01em;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      background:
        linear-gradient(136deg, rgba(255,255,255,0.2), rgba(255,255,255,0.06) 48%, rgba(255,255,255,0.01)),
        var(--glass-bg);
      box-shadow:
        0 10px 24px rgba(0,6,18,0.4),
        inset 0 1px 0 rgba(255,255,255,0.48),
        inset 0 -1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(20px) saturate(170%);
      -webkit-backdrop-filter: blur(20px) saturate(170%);
      position: relative;
      overflow: hidden;
      isolation: isolate;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .gl::before {
      content: "";
      position: absolute;
      inset: -60% -40%;
      background: linear-gradient(115deg, transparent 22%, rgba(255,255,255,0.38) 48%, transparent 74%);
      transform: translate3d(-42%, -4%, 0) rotate(16deg);
      opacity: 0.45;
      transition: transform 0.7s cubic-bezier(0.2, 0.6, 0.1, 1), opacity 0.3s;
      pointer-events: none;
    }
    .gl::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        radial-gradient(100% 70% at 10% 0%, rgba(255,255,255,0.28), transparent 52%),
        radial-gradient(80% 65% at 95% 110%, rgba(80,160,255,0.2), transparent 55%);
      opacity: 0.5;
      mix-blend-mode: screen;
      animation: drift 6s ease-in-out infinite alternate;
    }
    .gl:hover, .gl:focus-visible {
      transform: translateY(-1.5px);
      border-color: rgba(255,255,255,0.38);
      box-shadow: 0 14px 30px rgba(0,8,22,0.48), inset 0 1px 0 rgba(255,255,255,0.62), inset 0 -1px 0 rgba(255,255,255,0.16);
      outline: none;
    }
    .gl:hover::before { transform: translate3d(34%, -2%, 0) rotate(16deg); opacity: 0.65; }
    .gl:active { transform: translateY(0); transition-duration: 0.06s; }
    .gl svg { width: 18px; height: 18px; flex-shrink: 0; position: relative; z-index: 1; }
    .gl span { position: relative; z-index: 1; }
    .gl + .gl { margin-top: 10px; }

    /* Telegram-tinted button */
    .gl--tg {
      background: linear-gradient(130deg, rgba(100,180,255,0.2), rgba(60,120,255,0.06) 50%, transparent), var(--glass-bg);
    }
    /* Primary action button */
    .gl--primary {
      background: linear-gradient(135deg, rgba(255,255,255,0.24), rgba(255,255,255,0.06) 52%, transparent), var(--glass-bg);
      font-weight: 600;
    }
    /* Disabled button */
    .gl--disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── Separator ── */
    .sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px 0;
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .sep::before, .sep::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    /* ── Status / version ── */
    .msg {
      min-height: 18px;
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: var(--text-soft);
    }
    .ver {
      margin-top: 6px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: rgba(180,205,235,0.4);
    }

    @keyframes drift {
      0%   { transform: translate3d(-3%, 0, 0) scale(1.01); }
      100% { transform: translate3d(3%, -1%, 0) scale(1.04); }
    }

    /* ── Tool invocation pills ── */
    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 12px;
      min-height: 0;
    }
    .tool-pill {
      font-size: 11px;
      padding: 4px 11px;
      border-radius: 9px;
      background: rgba(120,180,255,0.1);
      border: 1px solid rgba(120,180,255,0.2);
      color: rgba(170,210,255,0.9);
      letter-spacing: 0.02em;
      animation: tool-in 0.25s ease;
      transition: opacity 0.4s, background 0.3s, border-color 0.3s;
    }
    .tool-done {
      background: rgba(77,226,167,0.1);
      border-color: rgba(77,226,167,0.25);
      color: rgba(170,255,220,0.9);
    }
    .tool-fade { opacity: 0; }
    @keyframes tool-in {
      from { opacity: 0; transform: scale(0.85) translateY(4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Recording mode ── */
    #recordingBar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      z-index: 30;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #recordingBar.active { opacity: 1; }
    #recordingBarFill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #ff6a75, #ff4757);
      border-radius: 0 2px 2px 0;
      box-shadow: 0 0 12px rgba(255,71,87,0.5);
    }
    #recordingBarFill.filling {
      width: 100%;
      transition: width 3s linear;
    }

    #recordingHint {
      position: fixed;
      top: max(60px, env(safe-area-inset-top));
      left: 20px;
      right: 20px;
      z-index: 25;
      text-align: center;
      font-size: 12px;
      line-height: 1.5;
      letter-spacing: 0.03em;
      color: rgba(255,120,130,0.8);
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.4s, transform 0.4s;
      pointer-events: none;
    }
    #recordingHint.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #transcriptDisplay {
      position: fixed;
      bottom: 220px;
      left: 24px;
      right: 24px;
      z-index: 25;
      text-align: center;
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
      max-height: 35vh;
      overflow-y: auto;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #transcriptDisplay.visible { opacity: 1; }
    #transcriptDisplay .interim {
      color: rgba(255,255,255,0.35);
    }

    /* ── Card overlay — fullscreen on top of everything ── */
    #cardOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 50;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #cardOverlay.active { display: block; }

    #swipeCounter {
      position: absolute;
      bottom: max(36px, env(safe-area-inset-bottom));
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
    }

    /* Processing spinner */
    #processingOverlay {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #processingOverlay.active { display: flex; }
    .processing-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,120,130,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Background transition for recording mode */
    body {
      transition: --sphere-tint-1 0.6s, --sphere-tint-2 0.6s;
    }
    @property --sphere-tint-1 {
      syntax: '<color>';
      inherits: true;
      initial-value: rgba(60,110,220,0.18);
    }
    @property --sphere-tint-2 {
      syntax: '<color>';
      inherits: true;
      initial-value: rgba(30,65,160,0.14);
    }

    /* ── Fullscreen touch target ── */
    #touchTarget {
      position: fixed;
      inset: 0;
      z-index: 2;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Floating bottom UI ── */
    #bottomUI {
      text-align: center;
      pointer-events: none;
    }
    #bottomUI .pills { pointer-events: auto; }
    #bottomUI .tools { pointer-events: auto; }

    /* ── Mic button active state (status pill now) ── */
    .mic-active {
      border-color: rgba(77,226,167,0.55) !important;
      box-shadow:
        0 0 24px rgba(77,226,167,0.15),
        0 10px 24px rgba(0,6,18,0.4),
        inset 0 1px 0 rgba(255,255,255,0.48),
        inset 0 -1px 0 rgba(255,255,255,0.1) !important;
    }
    .mic-active svg { color: var(--ok); }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .overlay { padding-left: 14px; padding-right: 14px; }
      .card { border-radius: 20px; padding: 16px 14px 12px; }
      .gl { min-height: 48px; border-radius: 14px; font-size: 13px; }
      .brand h1 { font-size: clamp(26px, 8.5vw, 36px); }
    }
    @media (max-height: 680px) {
      .brand { padding-top: clamp(10px, 2vh, 20px); }
      .brand p { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .gl, .gl::before, .gl::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

  <!-- Recording loading bar -->
  <div id="recordingBar"><div id="recordingBarFill"></div></div>

  <!-- Recording hint -->
  <div id="recordingHint">Your recording a note. It would be saved in the system literally, word by word</div>

  <!-- Live transcript -->
  <div id="transcriptDisplay"></div>

  <!-- Processing spinner -->
  <div id="processingOverlay"><div class="processing-spinner"></div></div>

  <!-- Card overlay -->
  <div id="cardOverlay">
    <div id="swipeCounter"></div>
  </div>

  <!-- 3D Sphere Canvas -->
  <canvas id="sphereCanvas"></canvas>

  <!-- Fullscreen touch target -->
  <div id="touchTarget"></div>

  <!-- Floating UI (no card, no button — just status + tools) -->
  <div class="overlay">
    <div class="brand">
      <h1>Neron</h1>
      <p>Voice Knowledge Assistant</p>
    </div>

    <div style="flex:1"></div>

    <div id="bottomUI">
      <div class="tools" id="tools"></div>
      <div class="pills">
        <span class="pill" id="statusPill">Tap to connect</span>
      </div>
      <div class="ver">Hold to record a note</div>
    </div>
  </div>

  <!-- Hidden mic button (voice.js binds to it, we trigger it programmatically) -->
  <button id="micBtn" style="display:none"><span id="micLabel"></span></button>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="sphere.js"></script>
  <script src="config.js"></script>
  <script src="voice.js"></script>
  <script src="cards.js"></script>
  <script src="recording.js"></script>

  <!-- tap ripple now handled by recording.js via #touchTarget -->

</body>
</html>
